$kind: http-request
description: Returns a single sale by transaction ID
url: "{{base_url}}/api/sales/{{sale_id}}"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('Returns correct sale', function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
        pm.expect(json.data).to.have.property('items');
        pm.expect(json.data.items).to.be.an('array');
      });
    language: text/javascript
order: 4000
