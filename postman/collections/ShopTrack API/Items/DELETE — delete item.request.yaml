$kind: http-request
description: Deletes an item from inventory
url: "{{base_url}}/api/items/{{item_id}}"
method: DELETE
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('Item deleted successfully', function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
        pm.expect(json.message).to.equal('Item deleted successfully');
      });
    language: text/javascript
order: 7000
