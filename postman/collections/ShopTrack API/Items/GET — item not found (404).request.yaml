$kind: http-request
description: Should return 404 for a non-existent SKU
url: "{{base_url}}/api/items/INVALID123"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 404', function () {
        pm.response.to.have.status(404);
      });
      pm.test('Returns error message', function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.false;
        pm.expect(json.error).to.equal('Item not found');
      });
    language: text/javascript
order: 3000
